services:
  backend:
    build: ./backend
    container_name: day5-backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10k"
        max-file: "3"
    environment:
      MONGO_URI: mongodb://mongo:27017/todos
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      retries: 3
    volumes:
      - ./logs/backend:/app/logs

  mongo:
    image: mongo:7
    container_name: mongo
    logging:
      driver: "json-file"
      options:
        max-size: "10k"
        max-file: "3"
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    container_name: day5-nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10k"
        max-file: "3"
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
  
volumes:
  mongo_data: